name: Magazine Auto-Pilot

on:
  schedule:
    # 每天 JST 23:59 运行 (UTC 14:59)
    - cron: '59 14 * * *'
  workflow_dispatch: # 允许手动点击运行，方便测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # ⚠️ 已升级到安全的 3.11 版本

      - name: Install dependencies
        # ⚠️ 更新了官方最新的 google-genai 包，并确保安装了 cloudinary
        run: |
          pip install notion-client google-genai requests cloudinary

      - name: Run Auto-Pilot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        # 强制输出日志
        run: python -u main.py
