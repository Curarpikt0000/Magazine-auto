name: Magazine Auto-Pilot

on:
  schedule:
    # 每天 JST 23:59 运行 (UTC 14:59)
    - cron: '59 14 * * *'
  workflow_dispatch: # 允许手动点击运行，方便测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install notion-client google-generativeai requests

      - name: Run Auto-Pilot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 您还需要去 aistudio.google.com 申请一个免费 KEY 放入 Secrets
        run: python main.py
