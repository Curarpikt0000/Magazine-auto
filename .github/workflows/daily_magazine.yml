name: Magazine Auto-Pilot

on:
  schedule:
    - cron: '59 14 * * *' # 每天定时运行
  workflow_dispatch:      # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install notion-client google-genai requests cloudinary

      - name: Run Auto-Pilot
        id: autopilot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        # 使用 2> 将错误日志重定向，并确保脚本即使报错也继续执行后续的 Self-Healing
        run: python -u main.py 2> error.log
        continue-on-error: true

      - name: AI Self-Healing
        # 只有当 error.log 文件不为空时才运行
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          if [ -s error.log ]; then
            echo "发现错误日志，启动自愈程序..."
            python self_healer.py
          else
            echo "未发现错误，流程正常。"
          fi

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error.log
