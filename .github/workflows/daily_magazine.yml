name: Magazine Auto-Pilot

on:
  schedule:
    - cron: '59 14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # ⚠️ 已升级，消除 Node.js 警告

      - name: Set up Python
        uses: actions/setup-python@v5  # ⚠️ 已升级，消除 Node.js 警告
        with:
          python-version: '3.11'

      - name: Install dependencies
        # 不再纠结降级，直接安装最新版
        run: |
          pip install notion-client google-genai requests cloudinary

      - name: Run Auto-Pilot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        run: python -u main.py
